name: Playwright Tests

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt allure-behave
          npm install -g allure-commandline
          allure --version

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Prepare artifact directories
        run: mkdir -p allure-results allure-report screenshots

      - name: Run Behave tests
        run: |
          xvfb-run --auto-servernum behave \
            --tags=@happy_path \
            --format allure_behave.formatter:AllureFormatter \
            --outfile allure-results \
            --format pretty \
            --no-capture

      - name: Generate Allure report
        if: ${{ always() }}
        run: |
          if [ -n "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "No Allure results were generated."
          fi

      - name: Upload screenshots on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Allure artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            allure-results/
            allure-report/
          if-no-files-found: ignore
          retention-days: 30
